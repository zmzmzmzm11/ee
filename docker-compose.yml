# EveBox Docker Compose — Production
# ====================================
# 启动:  docker compose up -d
# 停止:  docker compose down
# 日志:  docker compose logs -f
# 重建:  docker compose up -d --build
#
# 服务: Elasticsearch 7.17 + EveBox Server
# 访问: http://localhost:5636

services:
  # ============================================================
  # Elasticsearch
  # ============================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.28
    container_name: evebox-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE 'green|yellow'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  # ============================================================
  # EveBox Server
  # ============================================================
  evebox:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_REV: ${GIT_REV:-unknown}
        BUILD_REV: ${BUILD_REV:-unknown}
    image: ${EVEBOX_IMAGE:-evebox:latest}
    container_name: evebox-server
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - EVEBOX_HTTP_HOST=0.0.0.0
      - TZ=${TZ:-Asia/Shanghai}
    ports:
      - "${EVEBOX_PORT:-5636}:5636"
    volumes:
      - evebox-data:/var/lib/evebox
    command:
      - --datastore
      - elasticsearch
      - -e
      - http://elasticsearch:9200
      - -i
      - ${EVEBOX_INDEX:-evebox}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5636/api/version || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  es-data:
    driver: local
  evebox-data:
    driver: local
