# EveBox + Elasticsearch + Suricata Docker Compose
# 启动: docker compose up -d --build
# 停止: docker compose down

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.28
    container_name: elasticsearch
    network_mode: "host"
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://127.0.0.1:9200/_cluster/health | grep -qE 'green|yellow'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  suricata:
    image: suricata/suricata:latest
    container_name: suricata
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
      - IPC_LOCK
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - ./suricata-logs:/var/log/suricata
    # -i 后接实际网卡名称（如 eno2 / eth0）
    command:
      - -i
      - eth0
      - --set
      - stream.memcap=2gb
      - --set
      - flow.memcap=1gb
    restart: unless-stopped

  evebox:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_REV: ${GIT_REV:-unknown}
        BUILD_REV: ${BUILD_REV:-unknown}
    image: evebox:latest
    container_name: evebox
    network_mode: "host"
    volumes:
      - ./suricata-logs:/var/log/suricata:ro
      - evebox-data:/var/lib/evebox
    command:
      - --datastore
      - elasticsearch
      - -e
      - http://127.0.0.1:9200
      - --input
      - /var/log/suricata/eve.json
      - --port
      - "5636"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

volumes:
  esdata:
    driver: local
  evebox-data:
    driver: local
